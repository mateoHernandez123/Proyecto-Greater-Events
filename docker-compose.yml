# MySQL 8 con las mismas credenciales que application.properties (root / insecure, BD pdyc2026).
# Arranque: docker compose up -d
# Parada:   docker compose down
# Puerto:   3306 en localhost (igual que la URL JDBC del proyecto).

services:
  mysql:
    image: mysql:8.0
    container_name: greater-events-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: insecure
      MYSQL_DATABASE: pdyc2026
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pinsecure"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
