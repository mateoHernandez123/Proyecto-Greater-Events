spring.application.name=greater-events

# Si la tabla de artistas está vacía al iniciar, se cargan datos de ejemplo (SampleDataLoader; no aplica al perfil test).
# Sin MySQL: arrancá con perfil local (H2 en memoria), por ejemplo: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

# MySQL en localhost:3306 — usuario root, contraseña insecure, base pdyc2026 (alineado con la consigna).
# Opciones para tener el servidor:
#   1) Docker (recomendado si usás Docker Desktop): en la raíz del repo, docker compose up -d
#   2) MySQL nativo: winget install -e --id Oracle.MySQL  luego  PowerShell:  dev-support\start-mysql.ps1
spring.datasource.url=jdbc:mysql://localhost:3306/pdyc2026
spring.datasource.username=root
spring.datasource.password=insecure
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
